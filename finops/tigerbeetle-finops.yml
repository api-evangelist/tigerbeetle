description: >-
  FinOps view of TigerBeetle spend. TigerBeetle's database is open source
  (Apache 2.0) and free to self-host - in that model there is no vendor invoice
  and no per-operation charge; the cost is entirely your own compute, storage,
  and network for running the replicated cluster and the client applications
  that talk to it over the binary TCP protocol. TigerBeetle also offers a fully
  managed / enterprise service (cross-cloud deployments, disaster recovery,
  24/7 support) that is contact-sales with negotiated pricing rather than a
  metered, published rate card. Because access is via the binary-protocol client
  libraries, there is no billed-HTTP-request meter to allocate.
notes: >-
  Managed/enterprise per-unit rates are not public and not reconciled here;
  verify with sales@tigerbeetle.com. For self-hosted deployments the dominant
  costs are infrastructure (the TigerBeetle cluster nodes and their disks/
  network) rather than any TigerBeetle license or usage fee.
