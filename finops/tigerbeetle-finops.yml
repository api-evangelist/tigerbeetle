meters:
- name: self_hosted_compute
  description: Infrastructure cost of running the self-hosted TigerBeetle cluster nodes (no TigerBeetle invoice).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
  - cluster
- name: self_hosted_storage
  description: Disk storage consumed by the cluster's data files and replicas (no TigerBeetle invoice).
  unit: bytes
  aggregation: sum
  dimensions:
  - deployment
  - cluster
- name: managed_service_contract
  description: Negotiated fee for the fully managed / enterprise service; contact-sales, not publicly metered.
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: On self-hosted, monitor cluster node compute, disk, and network as the true cost; there is no vendor usage bill to track. On managed, track the negotiated contract.
- name: Allocation
  description: Attribute cluster infrastructure cost to the workloads/ledgers it serves; TigerBeetle's ledger and code fields on accounts can map internal cost centers.
- name: Optimization
  description: Batch operations to exploit TigerBeetle's high per-node throughput and right-size the cluster; a single small cluster can absorb very high transaction volume, avoiding overprovisioning.
- name: Accountability
  description: Assign an owner for the cluster's infrastructure budget (self-hosted) or the managed-service contract; review capacity against transaction growth.
