aid: tigerbeetle
url: https://raw.githubusercontent.com/api-evangelist/tigerbeetle/refs/heads/main/apis.yml
name: TigerBeetle
kind: company
description: TigerBeetle is an open-source (Apache 2.0) distributed financial
  accounting and transactions database, purpose-built for high-throughput,
  mission-critical double-entry bookkeeping and online transaction processing
  (OLTP). It is NOT an HTTP/REST API and ships no OpenAPI - the database is
  accessed over a custom binary wire protocol on TCP (default port 3000) via
  official client libraries for .NET, Go, Java, Node.js, Python, Ruby, and Rust.
  The "API" is the set of client operations - create_accounts, create_transfers,
  lookup_accounts, lookup_transfers, get_account_transfers, get_account_balances,
  query_accounts, and query_transfers - that use fixed-size, cache-line-aligned
  structs for zero-deserialization performance. TigerBeetle is self-hostable; a
  fully managed service is also offered to select enterprise partners via
  sales@tigerbeetle.com.
